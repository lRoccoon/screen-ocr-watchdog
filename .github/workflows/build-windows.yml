name: build-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Build exe (onedir)
        run: |
          $paddleocrDir = python -c "import paddleocr, os; print(os.path.dirname(paddleocr.__file__))"
          Write-Host "paddleocr source dir: $paddleocrDir"

          # paddleocr 通过 _import_file 动态加载 ppocr/tools 子模块，PyInstaller
          # 静态分析看不见这条动态链路上的 transitive deps。检测常用 paddleocr
          # 运行时依赖是否已装，装了就 --collect-all（含 C 扩展 binaries），
          # 避免在用户 Windows 上 ModuleNotFoundError 一个一个冒。
          $maybeDeps = @("shapely", "pyclipper", "imgaug", "skimage", "lmdb", "attrdict")
          $extraFlags = @()
          foreach ($dep in $maybeDeps) {
              python -c "import $dep" 2>$null
              if ($LASTEXITCODE -eq 0) {
                  $extraFlags += "--collect-all"
                  $extraFlags += $dep
                  Write-Host "  + collect-all $dep"
              } else {
                  Write-Host "  - skip $dep (not installed)"
              }
          }

          # --onedir 而非 --onefile：所有依赖文件物理放在 dist/ScreenOcrWatchdog/
          # 下，避开 _MEI*\ 临时解压目录引起的 paddleocr/Cython 找不到资源类问题。
          pyinstaller --noconfirm --onedir --windowed `
            --name ScreenOcrWatchdog `
            --collect-data Cython `
            --add-data "${paddleocrDir};paddleocr" `
            $extraFlags `
            app/__main__.py

      - name: Zip dist folder
        run: |
          Compress-Archive -Path dist/ScreenOcrWatchdog -DestinationPath dist/ScreenOcrWatchdog.zip
          Get-Item dist/ScreenOcrWatchdog.zip | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenOcrWatchdog
          path: dist/ScreenOcrWatchdog.zip
          if-no-files-found: error

      - name: Attach to release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ScreenOcrWatchdog.zip
