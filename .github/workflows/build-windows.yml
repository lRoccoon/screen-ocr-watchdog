name: build-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Build single-file exe
        run: |
          $paddleocrDir = python -c "import paddleocr, os; print(os.path.dirname(paddleocr.__file__))"
          Write-Host "paddleocr source dir: $paddleocrDir"
          pyinstaller --noconfirm --onefile --windowed `
            --name ScreenOcrWatchdog `
            --collect-data Cython `
            --add-data "${paddleocrDir};paddleocr" `
            app/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenOcrWatchdog-exe
          path: dist/ScreenOcrWatchdog.exe
          if-no-files-found: error

      - name: Attach to release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ScreenOcrWatchdog.exe
