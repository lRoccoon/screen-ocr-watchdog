<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>Fake Chat (for Screen OCR Watchdog dev)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <div class="left">
      <div class="poster">投资需谨慎,入市有风险</div>
      <div class="tip">这是模拟视频区<br/>右侧为待监控聊天区</div>
    </div>
    <aside class="chat" id="chat"></aside>
  </div>
  <div class="hud">
    <button id="btnBurst">一次追加 6 条 (burst)</button>
    <button id="btnPause">暂停追加</button>
    <span id="status">运行中</span>
  </div>
  <script src="chat.js"></script>
</body>
</html>
